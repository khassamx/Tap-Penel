<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tap Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="panel">

<h1>TAP PANEL</h1>

<input id="liveLink" placeholder="Pega el link del live">

<button class="tap" onclick="tap()">TAP x3</button>

<p>Taps enviados: <span id="tapCount">0</span></p>

<hr>

<h3>Login</h3>

<input id="gmail" placeholder="Cuenta">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

<p>Cuentas activas: <span id="active">0</span></p>

</div>

<script src="script.js"></script>

</body>
</html>
