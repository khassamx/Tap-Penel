<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRP TIKTOK TAP</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="panel">

<h1>IRP TIKTOK TAP</h1>

<input id="live" placeholder="Link del Live">

<div class="controls">

<button class="tap" onclick="tap()">TAP x3</button>
<button class="tap2" onclick="tap10()">TAP x10</button>
<button class="reset" onclick="reset()">Reset</button>

</div>

<div class="stats">

<p>🔥 Taps: <span id="tapCount">0</span></p>
<p>👥 Cuentas activas: <span id="active">0</span></p>
<p>⚡ Actividad: <span id="activity">0</span></p>

</div>

<hr>

<h3>Agregar Cuenta</h3>

<input id="gmail" placeholder="Cuenta">
<input id="password" type="password" placeholder="Contraseña">

<button class="login" onclick="login()">Conectar</button>

</div>

<script>

let taps = 0
let active = 0
let activity = 0

function tap(){
taps += 3
activity++
update()
}

function tap10(){
taps += 10
activity++
update()
}

function reset(){
taps = 0
activity = 0
update()
}

function login(){

let gmail = document.getElementById("gmail").value
let pass = document.getElementById("password").value

if(gmail && pass){

active++
update()

}

}

function update(){

document.getElementById("tapCount").innerText = taps
document.getElementById("active").innerText = active
document.getElementById("activity").innerText = activity

}

</script>

</body>
</html>
